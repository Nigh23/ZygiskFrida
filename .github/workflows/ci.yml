      - name: Create source files
        run: |
          # 创建 JNI 编译配置
          mkdir -p jni
          
          # 修复 Application.mk：完整变量名 + 标准 here-doc 格式
          cat > jni/Application.mk << 'EOF'
APP_ABI := arm64-v8a
APP_PLATFORM := android-24
APP_STL := c++_static
EOF
          
          # 修复 Android.mk：完整 Makefile 语法，无截断/缺失
          cat > jni/Android.mk << 'EOF'
LOCAL_PATH := $(call my-dir)
include $(CLEAR_VARS)
LOCAL_MODULE := dnf_hook
LOCAL_SRC_FILES := main.c
LOCAL_LDFLAGS += -ldl
LOCAL_STATIC_LIBRARIES += dobby
include $(BUILD_SHARED_LIBRARY)

include $(CLEAR_VARS)
LOCAL_MODULE := dobby
LOCAL_SRC_FILES := ../Dobby/libdobby.a
include $(PREBUILT_STATIC_LIBRARY)
EOF
          
          # 修复 main.c：完整头文件 + 修正函数语法
          cat > jni/main.c << 'EOF'
#include <stdint.h>
#include <stdlib.h>
#include <stdio.h>
#include <string.h>
#include <unistd.h>
#include <fcntl.h>
#include <sys/stat.h>
#include "dobby.h"

#define KEY_FILE    "/sdcard/dnf_keys/keys.txt"
#define DUMP_DIR    "/sdcard/dnf_dump/"

static void *(*old_AES_set_decrypt_key)(const void *key, int bits, void *aes) = NULL;
static void (*old_AES_cbc_encrypt)(const void *in, void *out, size_t len, const void *key, void *iv, int enc) = NULL;
static void *(*old_memcpy)(void *d, const void *s, size_t n) = NULL;

static void save_hex(const char *title, const uint8_t *data, int len) {
    mkdir(DUMP_DIR, 0777);
    int fd = open(KEY_FILE, O_CREAT | O_WRONLY | O_APPEND, 0666);
    if (fd < 0) return;
    dprintf(fd, "[%s] ", title);
    for (int i = 0; i < len; i++) {
        dprintf(fd, "%02x", data[i]);
    }
    dprintf(fd, "\n");
    close(fd);
}

static void dump_data(const void *data, size_t sz) {
    if (sz < 0x800 || sz > 0x800000) return;
    char path[256];
    snprintf(path, sizeof(path), "%s/%p.bin", DUMP_DIR, data);
    int fd = open(path, O_CREAT | O_WRONLY | O_TRUNC, 0666);
    if (fd >= 0) {
        write(fd, data, sz);
        close(fd);
    }
}

static void *new_AES_set_decrypt_key(const void *key, int bits, void *aes) {
    save_hex(bits == 128 ? "AES-128-KEY" : "AES-256-KEY", key, bits / 8);
    return old_AES_set_decrypt_key(key, bits, aes);
}

static void new_AES_cbc_encrypt(const void *in, void *out, size_t len, const void *key, void *iv, int enc) {
    if (enc == 0) {
        save_hex("AES-CBC-IV", iv, 16);
    }
    old_AES_cbc_encrypt(in, out, len, key, iv, enc);
}

static void *new_memcpy(void *d, const void *s, size_t n) {
    dump_data(s, n);
    return old_memcpy(d, s, n);
}

__attribute__((constructor))
void module_init(void) {
    while (dlopen("libil2cpp.so", RTLD_NOLOAD) == NULL || dlopen("libcrypto.so", RTLD_NOLOAD) == NULL) {
        usleep(300000);
    }
    void *aes_set_key = DobbySymbolResolver("libcrypto.so", "AES_set_decrypt_key");
    void *aes_cbc = DobbySymbolResolver("libcrypto.so", "AES_cbc_encrypt");
    void *memcpy = DobbySymbolResolver(NULL, "memcpy");
    DobbyHook(aes_set_key, new_AES_set_decrypt_key, (void**)&old_AES_set_decrypt_key);
    DobbyHook(aes_cbc, new_AES_cbc_encrypt, (void**)&old_AES_cbc_encrypt);
    DobbyHook(memcpy, new_memcpy, (void**)&old_memcpy);
}
EOF
